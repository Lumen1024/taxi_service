server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    discovery:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

jwt:
  secret: this-is-a-secret-key-for-jwt-signing-must-be-at-least-256-bits-long
  expiration-ms: 86400000
