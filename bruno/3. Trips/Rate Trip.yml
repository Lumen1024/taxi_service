info:
  name: Rate Trip
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/trips/{{trip_id}}/rate"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: '{"rating": 5}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
