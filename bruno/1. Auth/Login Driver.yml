info:
  name: Login Driver
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "driver@test.com",
        "password": "pass123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |
        if (res.getStatus() === 200) {
            var json = res.getBody();
            bru.setVar("driver_token", json.token);
            console.log('Driver logged in: userId=' + json.userId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
