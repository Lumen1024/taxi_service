info:
  name: Register Passenger
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "passenger@test.com",
        "password": "pass123",
        "role": "PASSENGER",
        "name": "Ivan",
        "phone": "+79000000001"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |
        if (res.getStatus() >= 200 && res.getStatus() < 300) {
            var json = res.getBody();
            bru.setVar("auth_token", json.token);
            console.log('Passenger registered: userId=' + json.userId);
        } else if (res.getStatus() === 409) {
            console.log('Passenger already exists, use Login Passenger');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
