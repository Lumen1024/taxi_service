info:
  name: Update Profile
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{base_url}}/profile"
  headers:
    - name: Authorization
      value: Bearer {{passenger_token}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: '{"name": "Ivan Updated", "phone": "+79000000099"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
